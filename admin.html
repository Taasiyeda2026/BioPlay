<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>פאנל בקרה – BioPlay</title>
  <link href="https://script.google.com/macros/s/AKfycbwCJ_J-1uKPM3-yl8OAvIEwtuvX_nV-oDTQ9GOw4L1AgVGPPU_Tpj1ieASOKtJMjzNFxQ/exec">
  <style>
    /* ══════════════════════════════════════════════
       RESET & BASE
    ══════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --dark:    #060e1e;
      --frame:   #0d1a2e;
      --border:  #1e3450;
      --green-hi:#00e676;
      --cyan-hi: #00bcd4;
      --white-bg:#f4f7fb;
      --card-bg: #edf3ee;
      --card-bdr:#b8d4ba;
      --text-dk: #1a2535;
      --text-md: #445566;
      --text-lt: #7a8fa0;
      --badge-bg:#bbdefb;
      --badge-c: #1565c0;
      --final-bg:#fff8e1;
      --final-bdr:#ffe082;
      --final-c: #e65100;
      --gold:    #ff9800;
    }

    html, body {
      background: var(--dark);
      color: var(--text-dk);
      font-family: "Assistant", Arial, sans-serif;
      min-height: 100svh;
      overflow-x: hidden;
    }

    body {
      padding: 18px 10px;
    }

    #panel-outer {
      max-width: 860px;
      margin: 0 auto;
      border: 2px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 18px 48px rgba(0,0,0,.45);
      min-height: auto;
    }

    .room-info {
      background: #f0f6ff;
      border-bottom: 1px solid #d8e5f2;
      padding: 10px 14px;
      display: grid;
      gap: 6px;
      font-size: .92rem;
      color: #294057;
    }

    .room-info strong { color: #10263f; }

    .room-link {
      color: #0b5ed7;
      direction: ltr;
      word-break: break-all;
      font-family: "Courier New", monospace;
      font-size: .84rem;
    }

    /* ══════════════════════════════════════════════
       LOGIN OVERLAY
    ══════════════════════════════════════════════ */
    #login-overlay {
      position: fixed;
      inset: 0;
      background: rgba(4, 10, 22, .96);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 16px;
    }

    .login-box {
      background: var(--white-bg);
      border: 3px solid var(--border);
      border-radius: 18px;
      padding: 32px 28px;
      width: min(380px, 100%);
      text-align: center;
      box-shadow: 0 0 40px rgba(0,230,118,.12), 0 20px 60px rgba(0,0,0,.5);
    }

    .login-logo {
      font-family: "Orbitron", sans-serif;
      font-size: 1.4rem;
      font-weight: 900;
      letter-spacing: 3px;
      color: var(--text-dk);
      margin-bottom: 4px;
    }

    .login-sub { font-size: .88rem; color: var(--text-lt); margin-bottom: 22px; }

    .login-input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #c8d8e8;
      border-radius: 12px;
      font-size: 1.1rem;
      background: white;
      color: var(--text-dk);
      margin-bottom: 14px;
      outline: none;
      text-align: center;
      letter-spacing: 3px;
      direction: ltr;
      font-family: "Courier New", monospace;
      transition: border-color .2s;
    }
    .login-input:focus { border-color: var(--green-hi); }

    .login-btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #1a8a1a, #2ea02e);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1.05rem;
      font-weight: 800;
      cursor: pointer;
      font-family: "Assistant", sans-serif;
      transition: filter .2s, transform .15s;
    }
    .login-btn:hover { filter: brightness(1.12); }
    .login-btn:active { transform: scale(.97); }
    .login-btn:disabled { opacity: .6; cursor: not-allowed; }

    .login-msg {
      min-height: 22px;
      margin-top: 12px;
      font-size: .92rem;
      font-weight: 700;
    }
    .login-msg.error   { color: #c62828; }
    .login-msg.success { color: #2e7d32; }
    .login-msg.info    { color: var(--text-lt); }

    /* ══════════════════════════════════════════════
       OUTER FRAME (visible on larger screens)
    ══════════════════════════════════════════════ */
    #panel-outer {
      position: relative;
      width: 100%;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
    }

    /* ══════════════════════════════════════════════
       MOBILE TOP BAR (sci-fi style header)
    ══════════════════════════════════════════════ */
    .top-bar {
      background: var(--frame);
      border-bottom: 3px solid var(--border);
      padding: 10px 14px 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-shrink: 0;
      /* corner accent lines */
      box-shadow: 0 3px 0 var(--green-hi);
    }

    .top-bar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .top-title {
      font-family: "Orbitron", sans-serif;
      font-size: .78rem;
      font-weight: 900;
      color: var(--green-hi);
      letter-spacing: 2px;
      line-height: 1.2;
    }

    .top-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: .78rem;
      font-weight: 700;
    }

    .status-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      animation: blink 2s ease-in-out infinite;
    }
    .status-dot.waiting { background: #ffa726; }
    .status-dot.started { background: var(--green-hi); box-shadow: 0 0 8px var(--green-hi); }
    .status-label { color: #ccc; }
    .status-label.started { color: var(--green-hi); }

    @keyframes blink { 50% { opacity: .25; } }

    .logout-sm {
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.18);
      color: #aaa;
      border-radius: 8px;
      padding: 5px 12px;
      font-size: .78rem;
      cursor: pointer;
      font-family: "Assistant", sans-serif;
      transition: background .2s;
    }
    .logout-sm:hover { background: rgba(255,255,255,.16); }

    /* ══════════════════════════════════════════════
       CONTENT AREA (white panel)
    ══════════════════════════════════════════════ */
    #panel-content {
      flex: 1;
      background: var(--white-bg);
      display: flex;
      flex-direction: column;
      gap: 0;
      overflow: hidden;
    }

    /* ══════════════════════════════════════════════
       CONTROLS ROW (PLAY, RESET, doors count)
    ══════════════════════════════════════════════ */
    .controls-section {
      padding: 16px 16px 10px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      border-bottom: 1px solid #dde6ee;
    }

    /* ── PLAY button ── */
    .btn-play {
      width: 80px; height: 80px;
      border-radius: 50%;
      border: 4px solid #155a15;
      background:
        radial-gradient(circle at 36% 28%, #b6ffb0 0%, #38c035 38%, #1c7a1c 65%, #0e4a0e 100%);
      box-shadow:
        0 5px 16px rgba(0,0,0,.5),
        0 0 22px rgba(56,192,53,.3),
        inset 0 -5px 10px rgba(0,0,0,.3);
      color: white;
      font-family: "Orbitron", sans-serif;
      font-size: .8rem;
      font-weight: 900;
      letter-spacing: 1px;
      cursor: pointer;
      position: relative;
      text-shadow: 0 1px 4px rgba(0,0,0,.6);
      transition: transform .15s, box-shadow .15s;
      flex-shrink: 0;
    }
    .btn-play::after {
      content: '';
      position: absolute;
      top: 10%; left: 16%;
      width: 68%; height: 38%;
      background: radial-gradient(ellipse at 50% 25%, rgba(255,255,255,.55), transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }
    .btn-play:hover:not(:disabled) {
      transform: scale(1.07);
      box-shadow: 0 8px 22px rgba(0,0,0,.55), 0 0 30px rgba(56,192,53,.45), inset 0 -5px 10px rgba(0,0,0,.3);
    }
    .btn-play:active:not(:disabled) { transform: scale(.96); }
    .btn-play:disabled { opacity: .5; cursor: not-allowed; }

    /* ── RESET button ── */
    .btn-reset {
      width: 80px; height: 80px;
      border-radius: 50%;
      border: 4px solid #5a1515;
      background:
        radial-gradient(circle at 36% 28%, #ffb0b0 0%, #c83535 38%, #7a1c1c 65%, #4a0e0e 100%);
      box-shadow:
        0 5px 16px rgba(0,0,0,.5),
        0 0 22px rgba(200,53,53,.3),
        inset 0 -5px 10px rgba(0,0,0,.3);
      color: white;
      font-family: "Orbitron", sans-serif;
      font-size: .75rem;
      font-weight: 900;
      letter-spacing: 1px;
      cursor: pointer;
      position: relative;
      text-shadow: 0 1px 4px rgba(0,0,0,.6);
      transition: transform .15s, box-shadow .15s;
      flex-shrink: 0;
    }
    .btn-reset::after {
      content: '';
      position: absolute;
      top: 10%; left: 16%;
      width: 68%; height: 38%;
      background: radial-gradient(ellipse at 50% 25%, rgba(255,255,255,.55), transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }
    .btn-reset:hover:not(:disabled) {
      transform: scale(1.07);
      box-shadow: 0 8px 22px rgba(0,0,0,.55), 0 0 30px rgba(200,53,53,.45), inset 0 -5px 10px rgba(0,0,0,.3);
    }
    .btn-reset:active:not(:disabled) { transform: scale(.96); }
    .btn-reset:disabled { opacity: .5; cursor: not-allowed; }

    /* ── Door count & feedback ── */
    .controls-right {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }

    .count-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .count-label {
      font-size: .82rem;
      color: var(--text-md);
      white-space: nowrap;
    }

    .count-select {
      padding: 5px 10px;
      border: 1.5px solid #b0c4d4;
      border-radius: 8px;
      background: white;
      color: var(--text-dk);
      font-size: .9rem;
      cursor: pointer;
      width: 72px;
    }

    .action-msg {
      min-height: 18px;
      font-size: .82rem;
      font-weight: 700;
      line-height: 1.3;
    }
    .action-msg.success { color: #2e7d32; }
    .action-msg.error   { color: #c62828; }
    .action-msg.info    { color: var(--text-lt); }

    /* ══════════════════════════════════════════════
       SEARCH ROW
    ══════════════════════════════════════════════ */
    .search-section {
      padding: 10px 16px;
      border-bottom: 1px solid #dde6ee;
      position: relative;
      display: flex;
      justify-content: flex-start;
    }

    .search-input-wrap {
      display: flex;
      gap: 6px;
      width: clamp(180px, 25%, 240px);
      max-width: 100%;
    }

    .search-input {
      flex: 1;
      min-width: 0;
      padding: 8px 10px;
      border: 2px solid #90bcd8;
      border-radius: 8px;
      font-size: .85rem;
      background: white;
      color: var(--text-dk);
      outline: none;
      font-family: "Assistant", sans-serif;
      direction: rtl;
      transition: border-color .2s;
    }
    .search-input:focus { border-color: var(--badge-c); }
    .search-input::placeholder { color: #a0b4c4; }

    .search-btn-icon {
      width: 34px; height: 34px;
      border: 2px solid #90bcd8;
      border-radius: 8px;
      background: white;
      font-size: .9rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background .15s;
    }
    .search-btn-icon:hover { background: #e3f2fd; }

    /* Autocomplete dropdown */
    .search-dropdown {
      position: absolute;
      top: calc(100% - 2px);
      right: 16px;
      left: auto;
      width: clamp(180px, 25%, 240px);
      max-width: calc(100% - 32px);
      background: white;
      border: 2px solid #90bcd8;
      border-top: none;
      border-radius: 0 0 10px 10px;
      max-height: 200px;
      overflow-y: auto;
      z-index: 50;
      display: none;
      box-shadow: 0 8px 24px rgba(0,0,0,.18);
    }
    .search-dropdown.open { display: block; }

    .dropdown-item {
      padding: 10px 14px;
      cursor: pointer;
      font-size: .93rem;
      color: var(--text-dk);
      border-bottom: 1px solid #eef2f6;
      transition: background .15s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .dropdown-item:last-child { border-bottom: none; }
    .dropdown-item:hover { background: #e3f2fd; }
    .dropdown-num {
      background: var(--badge-bg);
      color: var(--badge-c);
      border-radius: 6px;
      padding: 1px 7px;
      font-size: .8rem;
      font-weight: 800;
      flex-shrink: 0;
    }

    /* ══════════════════════════════════════════════
       SEARCH RESULT DISPLAY
    ══════════════════════════════════════════════ */
    .result-section {
      padding: 10px 16px 6px;
      display: flex;
      justify-content: center;
    }

    .result-wrap {
      position: relative;
      width: min(480px, 100%);
    }

    /* Orange bracket clips */
    .result-wrap::before,
    .result-wrap::after {
      content: '';
      position: absolute;
      top: -9px;
      width: 18px; height: 18px;
      border-top: 4px solid var(--gold);
      z-index: 1;
    }
    .result-wrap::before { right: 14px; border-right: 4px solid var(--gold); border-radius: 0 3px 0 0; }
    .result-wrap::after  { left: 14px;  border-left:  4px solid var(--gold); border-radius: 3px 0 0 0; }

    .result-box {
      border: 2px solid #b0c4d4;
      border-radius: 8px;
      background: white;
      padding: 9px 18px;
      text-align: center;
      font-size: .95rem;
      font-weight: 800;
      color: var(--text-md);
      letter-spacing: .5px;
      min-height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ══════════════════════════════════════════════
       STEP CARDS
    ══════════════════════════════════════════════ */
    .cards-section {
      flex: 1;
      padding: 10px 12px 6px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      overflow: auto;
    }

    /* Mobile: 2×2 grid */
    .cards-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      width: 100%;
      max-width: 560px;
    }

    .step-card-wrap {
      position: relative;
      padding-top: 18px;
    }

    .step-badge {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--badge-bg);
      border: 3px solid #90bcd8;
      color: var(--badge-c);
      font-weight: 900;
      font-size: 1.05rem;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
      box-shadow: 0 2px 8px rgba(0,0,0,.15);
    }

    .step-card-wrap.final .step-badge {
      background: var(--final-bg);
      border-color: var(--final-bdr);
      color: var(--final-c);
      font-size: .85rem;
    }

    .step-card {
      border: 2px solid var(--card-bdr);
      border-radius: 10px;
      background: var(--card-bg);
      overflow: hidden;
      min-height: 100px;
    }

    .step-card-wrap.final .step-card {
      background: var(--final-bg);
      border-color: var(--final-bdr);
    }

    /* Top portion of card */
    .card-top {
      padding: 26px 8px 6px; /* extra top for badge overlap */
      border-bottom: 2px solid var(--card-bdr);
      text-align: center;
    }
    .step-card-wrap.final .card-top {
      border-bottom-color: var(--final-bdr);
    }

    .card-top-label {
      font-size: .68rem;
      font-weight: 700;
      color: var(--text-lt);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .card-code {
      font-family: "Courier New", monospace;
      font-size: 1.5rem;
      font-weight: 900;
      color: var(--badge-c);
      letter-spacing: 5px;
      line-height: 1.1;
      margin-top: 2px;
    }

    .step-card-wrap.final .card-code {
      color: var(--final-c);
      font-size: 1.5rem;
    }

    /* Bottom portion: two cells */
    .card-bottom {
      display: flex;
      min-height: 48px;
    }

    .card-cell {
      flex: 1;
      padding: 6px 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 2px;
    }

    .card-cell + .card-cell {
      border-right: 2px solid var(--card-bdr); /* RTL: right border = visual left divider */
    }
    .step-card-wrap.final .card-cell + .card-cell {
      border-right-color: var(--final-bdr);
    }

    .cell-label {
      font-size: .6rem;
      font-weight: 700;
      color: var(--text-lt);
      text-transform: uppercase;
      letter-spacing: .8px;
    }

    .cell-value {
      font-size: .78rem;
      font-weight: 700;
      color: var(--text-dk);
      line-height: 1.3;
      word-break: break-word;
    }

    .cell-value.answer-correct { color: #1b5e20; }

    /* ══════════════════════════════════════════════
       FINAL CODE BAR (bottom)
    ══════════════════════════════════════════════ */
    .final-bar {
      background: var(--frame);
      border-top: 3px solid var(--border);
      box-shadow: 0 -3px 0 var(--green-hi);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .final-bar-label {
      font-family: "Orbitron", sans-serif;
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: 2px;
      color: #888;
      text-transform: uppercase;
    }

    .final-bar-code {
      font-family: "Courier New", monospace;
      font-size: 1.5rem;
      font-weight: 900;
      color: var(--final-c);
      letter-spacing: 6px;
      text-shadow: 0 0 10px rgba(255,150,0,.3);
    }

    /* ══════════════════════════════════════════════
       TOAST
    ══════════════════════════════════════════════ */
    #toast {
      position: fixed;
      bottom: 70px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(8,18,38,.92);
      color: white;
      padding: 9px 20px;
      border-radius: 20px;
      font-size: .88rem;
      font-weight: 700;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity .3s;
      z-index: 150;
      border: 1px solid rgba(255,255,255,.15);
    }
    #toast.show { opacity: 1; }

    /* ══════════════════════════════════════════════
       TABLET / DESKTOP UPGRADES
    ══════════════════════════════════════════════ */
    @media (min-width: 600px) {
      .btn-play, .btn-reset {
        width: 96px; height: 96px;
        font-size: .88rem;
      }

      .cards-grid {
        max-width: 640px;
        gap: 18px;
      }

      .card-code { font-size: 1.7rem; }
      .cell-value { font-size: .84rem; }
    }

    /* ── Desktop landscape: 4 cards in a row inside sci-fi frame ── */
    @media (min-width: 900px) {
      body { display: block; }

      #panel-outer {
        width: min(860px, 94vw);
        height: auto;
        border: 2px solid var(--border);
        border-radius: 18px;
        overflow: hidden;
        box-shadow: 0 18px 48px rgba(0,0,0,.45);
        outline: 1px solid transparent;
        position: relative;
      }

      /* Corner accent dots */
      #panel-outer::before,
      #panel-outer::after {
        content: '';
        position: absolute;
        width: 14px; height: 14px;
        border-radius: 50%;
        background: var(--green-hi);
        box-shadow: 0 0 10px var(--green-hi);
        z-index: 10;
      }
      #panel-outer::before { top: 8px; right: 8px; }
      #panel-outer::after  { bottom: 8px; left: 8px; }

      .top-bar {
        padding: 8px 20px 7px;
      }

      .controls-section { padding: 12px 20px 10px; }

      /* 4 columns in a row */
      .cards-section { padding: 8px 16px 4px; }

      .cards-grid {
        grid-template-columns: repeat(4, 1fr);
        max-width: 100%;
        gap: 16px;
      }

      .btn-play, .btn-reset {
        width: 100px; height: 100px;
        font-size: .9rem;
      }

      .card-code { font-size: 1.6rem; }
    }

    @media (min-width: 1100px) {
      .card-code { font-size: 1.9rem; }
      .cell-value { font-size: .9rem; }
      .step-badge { width: 40px; height: 40px; font-size: 1.1rem; }
    }
  </style>
</head>
<body>

  <!-- ══ LOGIN OVERLAY ══════════════════════════════ -->
  <div id="login-overlay">
    <div class="login-box">
      <div class="login-logo">BIOPLAY</div>
      <p class="login-sub">כניסת מדריך – הזינו קוד</p>
      <input id="login-code" class="login-input" type="password"
             placeholder="• • • • • •" autocomplete="off">
      <button id="login-btn" class="login-btn">כניסה למערכת</button>
      <p class="login-msg" id="login-msg"></p>
    </div>
  </div>

  <!-- ══ MAIN PANEL ══════════════════════════════════ -->
  <div id="panel-outer">

    <!-- Top bar -->
    <div class="top-bar">
      <div class="top-bar-left">
        <div>
          <div class="top-title">BIOPLAY ADMIN</div>
        </div>
        <div class="top-status">
          <span class="status-dot waiting" id="status-dot"></span>
          <span class="status-label" id="status-label">ממתין</span>
        </div>
      </div>
      <button class="logout-sm" id="logout-btn">יציאה</button>
    </div>

    <div class="room-info">
      <div><strong>Room ID:</strong> <span id="room-id-label">—</span></div>
      <div><strong>קישור תלמידים:</strong> <a id="student-link" class="room-link" href="#">—</a></div>
    </div>

    <!-- White content area -->
    <div id="panel-content">

      <!-- Controls row: PLAY, RESET, door count -->
      <div class="controls-section">
        <button class="btn-play" id="activate-btn">PLAY</button>
        <button class="btn-reset" id="reset-btn">RESET</button>
        <div class="controls-right">
          <div class="count-row">
            <span class="count-label">מספר דלתות:</span>
            <select id="doors-count-select" class="count-select"></select>
          </div>
          <div class="action-msg" id="action-msg"></div>
        </div>
      </div>

      <!-- Search -->
      <div class="search-section">
        <div class="search-input-wrap">
          <input id="search-input" class="search-input" type="search"
                 placeholder="🔍  חיפוש אורגניזם...">
          <button class="search-btn-icon" id="search-btn">🔍</button>
        </div>
        <div class="search-dropdown" id="search-dropdown"></div>
      </div>

      <!-- Result display -->
      <div class="result-section">
        <div class="result-wrap">
          <div class="result-box" id="result-box">חפשו אורגניזם לצפייה בקודים</div>
        </div>
      </div>

      <!-- Step cards — order: 1, 2, 3, final (RTL flex → shows final on left, 1 on right = like mockup) -->
      <div class="cards-section">
        <div class="cards-grid" id="cards-grid">

          <!-- Card 1 -->
          <div class="step-card-wrap">
            <div class="step-badge">1</div>
            <div class="step-card">
              <div class="card-top">
                <div class="card-top-label" id="c1-title">שלב 1</div>
                <div class="card-code" id="c1-code">—</div>
              </div>
              <div class="card-bottom">
                <div class="card-cell">
                  <span class="cell-label">קוד</span>
                  <span class="cell-value" id="c1-code2">—</span>
                </div>
                <div class="card-cell">
                  <span class="cell-label">תשובה</span>
                  <span class="cell-value answer-correct" id="c1-answer">—</span>
                </div>
              </div>
            </div>
          </div>

          <!-- Card 2 -->
          <div class="step-card-wrap">
            <div class="step-badge">2</div>
            <div class="step-card">
              <div class="card-top">
                <div class="card-top-label" id="c2-title">שלב 2</div>
                <div class="card-code" id="c2-code">—</div>
              </div>
              <div class="card-bottom">
                <div class="card-cell">
                  <span class="cell-label">קוד</span>
                  <span class="cell-value" id="c2-code2">—</span>
                </div>
                <div class="card-cell">
                  <span class="cell-label">תשובה</span>
                  <span class="cell-value answer-correct" id="c2-answer">—</span>
                </div>
              </div>
            </div>
          </div>

          <!-- Card 3 -->
          <div class="step-card-wrap">
            <div class="step-badge">3</div>
            <div class="step-card">
              <div class="card-top">
                <div class="card-top-label" id="c3-title">שלב 3</div>
                <div class="card-code" id="c3-code">—</div>
              </div>
              <div class="card-bottom">
                <div class="card-cell">
                  <span class="cell-label">קוד</span>
                  <span class="cell-value" id="c3-code2">—</span>
                </div>
                <div class="card-cell">
                  <span class="cell-label">תשובה</span>
                  <span class="cell-value answer-correct" id="c3-answer">—</span>
                </div>
              </div>
            </div>
          </div>

          <!-- Card 4 = Final lock -->
          <div class="step-card-wrap final">
            <div class="step-badge">4</div>
            <div class="step-card">
              <div class="card-top">
                <div class="card-top-label" style="color:#b26200">מנעול סופי</div>
                <div class="card-code" id="c4-code">—</div>
              </div>
              <div class="card-bottom">
                <div class="card-cell" style="flex:1">
                  <span class="cell-label">FINAL CODE</span>
                  <span class="cell-value" id="c4-code2" style="font-family:'Courier New',monospace;color:var(--final-c);font-size:.95rem;letter-spacing:3px;font-weight:900">—</span>
                </div>
              </div>
            </div>
          </div>

        </div><!-- /cards-grid -->
      </div><!-- /cards-section -->

    </div><!-- /panel-content -->

    <!-- Bottom final code bar -->
    <div class="final-bar">
      <span class="final-bar-label">FINAL CODE</span>
      <span class="final-bar-code" id="final-bar-code">——</span>
    </div>

  </div><!-- /panel-outer -->

  <div id="toast"></div>

  <script>
    const APPS_URL   = "https://script.google.com/macros/s/AKfycbxShbtJpFPOl8Jx7T73irGuJdXXc1M469UZNbFf3ByQ1ZSfoRZdvZHwEb2m6QHv26513Q/exec";
    const POLL_MS    = 4000;

    const qp = new URLSearchParams(window.location.search);
    const roomId = (qp.get("room") || "").trim().toUpperCase();

    const scoped = (base) => `${base}_${roomId || "NO_ROOM"}`;
    const SESS_KEY  = scoped("bioplay_admin_token");
    const DOORS_KEY = scoped("bioplay_doors_count");

    let teacherToken = "";
    let pollTimer = null;
    let doorsData = [];
    let doorsCount = Math.max(2, parseInt(localStorage.getItem(DOORS_KEY), 10) || 5);

    const loginOverlay  = document.getElementById("login-overlay");
    const loginCodeEl   = document.getElementById("login-code");
    const loginMsg      = document.getElementById("login-msg");
    const loginBtn      = document.getElementById("login-btn");
    const statusDot     = document.getElementById("status-dot");
    const statusLabel   = document.getElementById("status-label");
    const actionMsg     = document.getElementById("action-msg");
    const activateBtn   = document.getElementById("activate-btn");
    const resetBtn      = document.getElementById("reset-btn");
    const logoutBtn     = document.getElementById("logout-btn");
    const doorsSelect   = document.getElementById("doors-count-select");
    const searchInput   = document.getElementById("search-input");
    const searchDropdown= document.getElementById("search-dropdown");
    const resultBox     = document.getElementById("result-box");
    const finalBarCode  = document.getElementById("final-bar-code");
    const toastEl       = document.getElementById("toast");
    const roomIdLabel   = document.getElementById("room-id-label");
    const studentLinkEl = document.getElementById("student-link");

    roomIdLabel.textContent = roomId || "חסר";
    if (roomId) {
      const studentUrl = `${window.location.origin}${window.location.pathname.replace(/admin\.html$/, "bioplay.html")}?room=${encodeURIComponent(roomId)}`;
      studentLinkEl.textContent = studentUrl;
      studentLinkEl.href = studentUrl;
    } else {
      studentLinkEl.textContent = "אין קישור – חסר room";
      studentLinkEl.removeAttribute("href");
    }

    const cards = {
      1: { title: document.getElementById("c1-title"), code: document.getElementById("c1-code"), code2: document.getElementById("c1-code2"), answer: document.getElementById("c1-answer") },
      2: { title: document.getElementById("c2-title"), code: document.getElementById("c2-code"), code2: document.getElementById("c2-code2"), answer: document.getElementById("c2-answer") },
      3: { title: document.getElementById("c3-title"), code: document.getElementById("c3-code"), code2: document.getElementById("c3-code2"), answer: document.getElementById("c3-answer") },
      4: { code: document.getElementById("c4-code"), code2: document.getElementById("c4-code2") },
    };

    for (let n = 2; n <= 30; n++) {
      const o = document.createElement("option");
      o.value = n; o.textContent = n;
      if (n === doorsCount) o.selected = true;
      doorsSelect.appendChild(o);
    }

    doorsSelect.addEventListener("change", () => {
      doorsCount = parseInt(doorsSelect.value, 10) || 5;
      localStorage.setItem(DOORS_KEY, doorsCount);
    });

    let toastT;
    function toast(msg, type = "info") {
      toastEl.textContent = msg;
      toastEl.style.background = type === "success" ? "rgba(20,100,20,.95)" : type === "error" ? "rgba(150,20,20,.95)" : "rgba(8,18,38,.92)";
      toastEl.classList.add("show");
      clearTimeout(toastT);
      toastT = setTimeout(() => toastEl.classList.remove("show"), 3000);
    }

    function setFatalRoomError() {
      loginBtn.disabled = true;
      activateBtn.disabled = true;
      resetBtn.disabled = true;
      loginMsg.textContent = "חסר roomId בקישור. יש לפתוח admin.html?room=<ROOM_ID>";
      loginMsg.className = "login-msg error";
      actionMsg.textContent = "לא ניתן לבצע פעולות ללא roomId";
      actionMsg.className = "action-msg error";
    }

    async function parse(res) {
      const raw = await res.text();
      if (!raw) return {};
      try { return JSON.parse(raw); } catch { return {}; }
    }

    async function getStatus() {
      const url = `${APPS_URL}?action=status&roomId=${encodeURIComponent(roomId)}`;
      const res = await fetch(url, { cache: "no-store" });
      const d = await parse(res);
      if (!res.ok || d?.ok === false) throw new Error(d?.errorCode || d?.message || `HTTP ${res.status}`);
      return d?.status === "started" ? "started" : "waiting";
    }

    async function sendAction(action, token, extra = {}) {
      const body = new URLSearchParams({ action, roomId, ...extra });
      if (token) body.set("teacherToken", token);
      const res = await fetch(APPS_URL, {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: body.toString(),
      });
      const d = await parse(res);
      if (!res.ok || d?.ok === false) throw new Error(d?.errorCode || d?.message || `HTTP ${res.status}`);
      return d;
    }

    function setStatus(s) {
      const on = s === "started";
      statusDot.className   = `status-dot ${on ? "started" : "waiting"}`;
      statusLabel.className = `status-label ${on ? "started" : ""}`;
      statusLabel.textContent = on ? "פעיל ✔" : "ממתין";
    }

    function startPolling() {
      clearInterval(pollTimer);
      (async () => { try { setStatus(await getStatus()); } catch {} })();
      pollTimer = setInterval(async () => {
        try { setStatus(await getStatus()); } catch {}
      }, POLL_MS);
    }

    async function doLogin() {
      if (!roomId) return setFatalRoomError();
      const code = loginCodeEl.value.trim();
      if (!code) { loginMsg.textContent = "יש להזין טוקן מדריך."; loginMsg.className = "login-msg error"; return; }
      loginBtn.disabled = true;
      teacherToken = code;
      sessionStorage.setItem(SESS_KEY, code);
      localStorage.setItem(DOORS_KEY, doorsCount);
      loginMsg.textContent = "";
      loginBtn.disabled = false;
      enterPanel();
    }

    function enterPanel(initStatus) {
      loginOverlay.style.display = "none";
      if (initStatus) setStatus(initStatus);
      startPolling();
      loadDoors();
    }

    loginBtn.onclick  = doLogin;
    loginCodeEl.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });

    activateBtn.onclick = async () => {
      if (!teacherToken || !roomId) return;
      activateBtn.disabled = true;
      actionMsg.textContent = "מפעיל..."; actionMsg.className = "action-msg info";
      try {
        const r = await sendAction("start", teacherToken, { doorsCount });
        const resolvedCount = parseInt(r?.doorsCount, 10) || doorsCount;
        localStorage.setItem(DOORS_KEY, resolvedCount);
        actionMsg.textContent = `✔ הופעל – ${resolvedCount} דלתות`; actionMsg.className = "action-msg success";
        setStatus("started");
        toast(`✔ המשחק הופעל! Room ${roomId}`, "success");
      } catch (e) {
        actionMsg.textContent = String(e.message || "שגיאת הפעלה"); actionMsg.className = "action-msg error";
        toast("שגיאה בהפעלה", "error");
      }
      activateBtn.disabled = false;
    };

    resetBtn.onclick = async () => {
      if (!teacherToken || !roomId) return;
      resetBtn.disabled = true;
      actionMsg.textContent = "מאפס..."; actionMsg.className = "action-msg info";
      try {
        await sendAction("reset", teacherToken);
        setStatus("waiting");
        actionMsg.textContent = "✔ אופס – המשחק חזר למצב המתנה"; actionMsg.className = "action-msg success";
        toast("✔ החדר אופס", "success");
      } catch (e) {
        actionMsg.textContent = String(e.message || "שגיאת איפוס"); actionMsg.className = "action-msg error";
      }
      resetBtn.disabled = false;
    };

    logoutBtn.onclick = () => {
      teacherToken = "";
      sessionStorage.removeItem(SESS_KEY);
      clearInterval(pollTimer);
      clearCards();
      loginOverlay.style.display = "flex";
      loginCodeEl.value = "";
      loginMsg.textContent = "";
    };

    async function loadDoors() {
      try {
        const res = await fetch("doors.json", { cache: "no-store" });
        doorsData = await res.json();
      } catch { doorsData = []; }
    }

    function clearCards() {
      resultBox.textContent = "חפשו אורגניזם לצפייה בקודים";
      finalBarCode.textContent = "——";
      [1,2,3].forEach(i => {
        cards[i].title.textContent  = `שלב ${i}`;
        cards[i].code.textContent   = "—";
        cards[i].code2.textContent  = "—";
        cards[i].answer.textContent = "—";
      });
      cards[4].code.textContent  = "—";
      cards[4].code2.textContent = "—";
    }

    function fillCards(door) {
      if (!door) { clearCards(); return; }
      const name = door.creature || door.title || `דלת ${door.id}`;
      resultBox.textContent = name;
      (door.steps || []).forEach((step, i) => {
        const n = i + 1;
        if (n > 3) return;
        cards[n].title.textContent  = step.title || `שלב ${n}`;
        cards[n].code.textContent   = step.code  || "—";
        cards[n].code2.textContent  = step.code  || "—";
        cards[n].answer.textContent = step.answer || "—";
      });
      const fc = door.finalLockCode || "—";
      cards[4].code.textContent  = fc;
      cards[4].code2.textContent = fc;
      finalBarCode.textContent   = fc;
    }

    function buildDropdown(q) {
      const items = q
        ? doorsData.filter(d =>
            (d.creature || "").toLowerCase().includes(q.toLowerCase()) ||
            String(d.id) === q
          )
        : [];

      if (!items.length) { searchDropdown.classList.remove("open"); return; }

      searchDropdown.innerHTML = items.slice(0, 10).map(d => `
        <div class="dropdown-item" data-id="${d.id}">
          <span class="dropdown-num">${d.id}</span>
          <span>${d.creature || d.title || `דלת ${d.id}`}</span>
        </div>
      `).join("");

      searchDropdown.querySelectorAll(".dropdown-item").forEach(el => {
        el.onclick = () => {
          const door = doorsData.find(d => d.id === parseInt(el.dataset.id, 10));
          fillCards(door);
          searchInput.value = door ? (door.creature || door.title || "") : "";
          searchDropdown.classList.remove("open");
        };
      });

      searchDropdown.classList.add("open");
    }

    let searchT;
    searchInput.addEventListener("input", () => {
      clearTimeout(searchT);
      searchT = setTimeout(() => buildDropdown(searchInput.value.trim()), 200);
    });

    document.addEventListener("click", e => {
      if (!e.target.closest(".search-section")) {
        searchDropdown.classList.remove("open");
      }
    });

    document.getElementById("search-btn").onclick = () => {
      const q = searchInput.value.trim();
      const door = doorsData.find(d =>
        (d.creature || "").toLowerCase().includes(q.toLowerCase()) || String(d.id) === q
      );
      fillCards(door || null);
      if (!door) resultBox.textContent = "לא נמצא";
      searchDropdown.classList.remove("open");
    };

    searchInput.addEventListener("keydown", e => {
      if (e.key === "Enter") document.getElementById("search-btn").click();
    });

    (async () => {
      if (!roomId) return setFatalRoomError();
      const saved = sessionStorage.getItem(SESS_KEY);
      if (saved) {
        teacherToken = saved;
        loginCodeEl.value = saved;
        enterPanel();
      }
    })();
  </script>

</body>
</html>
