<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>דלתות הטבע: חדר בריחה ביומימיקרי ZOOM</title>

  <style>
    :root {
      --bg: #07111f;
      --bg-2: #13284a;
      --panel: rgba(9, 19, 42, 0.84);
      --panel-strong: rgba(5, 12, 28, 0.82);
      --text: #eef5ff;
      --muted: #c4d4ef;
      --accent: #62d9ff;
      --accent-2: #88f3b9;
      --title: #7cf6ff;
      --heading-strong: #ffe79b;
      --danger: #ff91a8;
      --warning: #ffd985;
      --border: rgba(255,255,255,.16);
      --shadow: 0 18px 40px rgba(0,0,0,.34);
      --radius: 22px;
      --ease: 700ms cubic-bezier(.22,.61,.36,1);
    }

    * {
      box-sizing: border-box;
      font-family: "Assistant", "Rubik", Arial, sans-serif;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 18% 8%, rgba(98,217,255,.2), transparent 26%),
        radial-gradient(circle at 82% 12%, rgba(136,243,185,.14), transparent 24%),
        linear-gradient(160deg, var(--bg-2), var(--bg));
      color: var(--text);
    }

    body {
      padding: 16px;
      zoom: 75%;
    }

    .app {
      width: min(1320px, 100%);
      margin-inline: auto;
      background: rgba(8, 14, 31, 0.42);
      border: 1px solid var(--border);
      border-radius: 26px;
      overflow: hidden;
      box-shadow: var(--shadow);
      position: relative;
      min-height: calc(100vh - 32px);
    }

    .screen {
      display: none;
      min-height: calc(100vh - 32px);
      padding: clamp(16px, 2.6vw, 34px);
      position: relative;
    }

    .screen.active {
      display: block;
      animation: fadeInUp .65s ease;
    }

    .top-strip {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding: 12px 16px;
      border-radius: 14px;
      background: rgba(255,255,255,.08);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 1.06rem;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.06);
    }

    .hero {
      min-height: calc(100vh - 140px);
      position: relative;
      display: grid;
      place-items: center;
      overflow: hidden;
      isolation: isolate;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(.72) saturate(1.02);
      transform: scale(1.03);
      z-index: -3;
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      z-index: -2;
      background:
        radial-gradient(circle at 50% 28%, rgba(136,243,185,.12), transparent 25%),
        linear-gradient(180deg, rgba(4,9,20,.18), rgba(4,9,20,.64));
    }

    .hero-particles {
      position: absolute;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,.95), rgba(98,217,255,.18));
      opacity: .65;
      animation: floatParticle linear infinite;
    }

    .hero-box {
      width: min(920px, 94%);
      padding: clamp(20px, 3vw, 34px);
      background: rgba(5, 11, 24, .55);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 24px;
      backdrop-filter: blur(7px);
      text-align: center;
      display: grid;
      gap: 10px;
      justify-items: center;
    }

    .logo-wrap {
      min-height: 110px;
      display: grid;
      place-items: center;
    }

    .logo {
      width: min(280px, 58vw);
      max-height: 100px;
      object-fit: contain;
      cursor: pointer;
      user-select: none;
      transition: transform .25s ease, filter .25s ease;
      animation: logoFloat 3.2s ease-in-out infinite;
    }

    .logo:hover {
      filter: drop-shadow(0 0 14px rgba(136,243,185,.34));
    }

    .logo:active {
      transform: scale(.96);
    }

    .logo.logo-error {
      padding: 10px 16px;
      border-radius: 14px;
      border: 1px solid rgba(255,145,168,.9);
      background: rgba(255,145,168,.14);
      animation: shake .6s ease;
    }

    .title {
      margin: 0;
      font-size: clamp(2.4rem, 6vw, 4.3rem);
      color: var(--heading-strong);
      text-shadow: 0 0 18px rgba(255,231,155,.4);
      line-height: 1.1;
    }

    .lead,
    .question-text,
    .summary-list,
    .finish-list {
      font-size: clamp(1.26rem, 2.8vw, 1.75rem);
      line-height: 1.85;
      color: var(--text);
    }

    .lead {
      max-width: 30em;
      margin: 0;
    }

    .instruction-layer.hidden {
      display: none;
    }

    .start-zone {
      width: 100%;
      min-height: 88px;
      display: grid;
      place-items: center;
      margin-top: 6px;
    }

    .wait-message {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 20px;
      border-radius: 14px;
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.2);
      color: var(--text);
      font-size: clamp(1.12rem, 2.5vw, 1.42rem);
      text-align: center;
    }

    .hidden {
      display: none !important;
    }

    .countdown {
      position: absolute;
      inset: 0;
      display: none;
      place-items: center;
      z-index: 10;
      background: rgba(4, 8, 18, .18);
    }

    .countdown.active {
      display: grid;
    }

    .countdown-box {
      background: rgba(6, 11, 25, .46);
      border: 1px solid rgba(255,255,255,.22);
      border-radius: 26px;
      padding: 20px 34px;
      text-align: center;
      animation: pulseGlow 1s ease-in-out infinite;
      backdrop-filter: blur(4px);
    }

    .countdown-number {
      font-size: clamp(4.8rem, 18vw, 12rem);
      font-weight: 800;
      line-height: 1;
      text-shadow: 0 0 30px rgba(98,217,255,.86);
    }

    .countdown-label {
      margin-top: 10px;
      font-size: clamp(1.2rem, 2.7vw, 1.6rem);
      color: var(--text);
    }

    .btn {
      border: none;
      border-radius: 14px;
      min-height: 48px;
      padding: 12px 18px;
      font-size: 1.04rem;
      font-weight: 800;
      cursor: pointer;
      transition: transform .22s ease, filter .22s ease, box-shadow .22s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.05);
      box-shadow: 0 10px 24px rgba(0,0,0,.28);
    }

    .btn:active {
      transform: scale(.98);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #29baff);
      color: #03111d;
    }

    .btn-secondary {
      background: #26345e;
      color: var(--text);
      border: 1px solid rgba(255,255,255,.16);
    }

    .btn-next {
      background: linear-gradient(135deg, var(--accent-2), var(--accent));
      color: #05111f;
      min-width: 138px;
    }

    .btn-start {
      animation: popIn .45s ease;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .admin-modal {
      position: absolute;
      inset: 0;
      display: none;
      place-items: center;
      background: rgba(4, 8, 18, .54);
      z-index: 30;
      animation: fadeIn .25s ease;
    }

    .admin-modal.active {
      display: grid;
    }

    .modal-card {
      width: min(430px, 92%);
      padding: 22px;
      border-radius: 18px;
      background: rgba(9, 16, 36, .96);
      border: 1px solid rgba(255,255,255,.18);
      box-shadow: 0 18px 40px rgba(0,0,0,.4);
    }

    .modal-title {
      margin: 0 0 10px;
      font-size: 1.5rem;
    }

    .modal-text {
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.7;
      font-size: 1.05rem;
    }

    .code-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .input {
      flex: 1 1 220px;
      min-height: 50px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.24);
      background: #0d1732;
      color: var(--text);
      padding: 10px 14px;
      font-size: 1.1rem;
      text-transform: uppercase;
    }

    .feedback {
      min-height: 32px;
      margin-top: 12px;
      font-size: 1.14rem;
      font-weight: 700;
    }

    .feedback.success {
      color: var(--accent-2);
      text-shadow: 0 0 12px rgba(136,243,185,.52);
    }

    .feedback.error {
      color: var(--danger);
    }

    .doors-card {
      padding: clamp(18px, 2.7vw, 30px);
    }

    .doors-title,
    .section-title,
    .question-title,
    .finish-title,
    .modal-title {
      margin: 0 0 10px;
      font-size: clamp(2rem, 4.6vw, 2.9rem);
      line-height: 1.2;
      color: var(--heading-strong);
      text-shadow: 0 0 12px rgba(255,231,155,.25);
    }

    .door-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
      margin-top: 20px;
    }

    .door-card {
      position: relative;
      overflow: hidden;
      border-radius: 20px;
      border: 1px solid rgba(98,217,255,.4);
      background: linear-gradient(165deg, rgba(35,56,107,.7), rgba(10,18,41,.92));
      transition: transform var(--ease), box-shadow var(--ease), border-color var(--ease);
    }

    .door-card:hover {
      transform: translateY(-7px) scale(1.015);
      border-color: var(--accent);
      box-shadow: 0 0 36px rgba(98,217,255,.24);
    }

    .door-card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(115deg, transparent 0%, rgba(255,255,255,.18) 48%, transparent 100%);
      transform: translateX(130%);
      transition: transform 1s ease;
      pointer-events: none;
    }

    .door-card:hover::after {
      transform: translateX(-120%);
    }

    .door-title {
      padding: 12px 10px;
      text-align: center;
      font-weight: 800;
      font-size: 1.32rem;
    }

    .door-image-wrap {
      position: relative;
      aspect-ratio: 4 / 5;
    }

    .door-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .door-footer {
      position: absolute;
      inset-inline: 0;
      bottom: 0;
      display: flex;
      justify-content: center;
      padding: 12px;
      background: linear-gradient(to top, rgba(5,11,25,.92), rgba(5,11,25,.1));
    }

    .question-card,
    .finish-card {
      padding: clamp(18px, 2.8vw, 30px);
    }

    .question-layout {
      display: grid;
      grid-template-columns: minmax(280px, 36%) 1fr;
      gap: 24px;
      align-items: stretch;
    }

    .question-visual {
      display: grid;
      place-items: center;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.04);
      min-height: 280px;
      overflow: hidden;
    }

    .question-visual img {
      width: 100%;
      max-width: 340px;
      object-fit: contain;
      display: block;
    }

    .answers {
      display: grid;
      gap: 12px;
      margin-top: 16px;
    }

    .answer {
      width: 100%;
      text-align: right;
      border: 1px solid rgba(255,255,255,.18);
      background: linear-gradient(145deg, #2b3d7a, #1a2855);
      color: var(--text);
      border-radius: 16px;
      padding: 16px 18px;
      font-size: clamp(1.12rem, 2.3vw, 1.36rem);
      cursor: pointer;
      transition: transform .22s ease, border-color .22s ease, box-shadow .22s ease;
      min-height: 60px;
    }

    .answer:hover {
      transform: translateX(-3px);
      border-color: var(--accent);
      box-shadow: 0 0 18px rgba(98,217,255,.18);
    }

    .answer.correct {
      background: rgba(136,243,185,.2);
      border-color: var(--accent-2);
      box-shadow: 0 0 20px rgba(136,243,185,.26);
      animation: popIn .35s ease;
    }

    .answer.wrong {
      background: rgba(255,145,168,.16);
      border-color: var(--danger);
      animation: shake .45s ease;
    }

    .code-panel {
      border: 1px solid rgba(98,217,255,.35);
      border-radius: 18px;
      padding: 18px;
      background: linear-gradient(145deg, rgba(30,44,87,.84), rgba(9,18,42,.94));
      transition: box-shadow .25s ease, transform .25s ease, filter .25s ease;
      position: relative;
      overflow: hidden;
    }

    .code-panel::before {
      content: "";
      position: absolute;
      inset: -40% auto auto -10%;
      width: 120%;
      height: 80%;
      background: radial-gradient(circle, rgba(136,243,185,.24), transparent 60%);
      pointer-events: none;
    }

    .code-title {
      margin: 0 0 12px;
      color: var(--heading-strong);
      font-size: clamp(1.2rem, 2.4vw, 1.6rem);
      text-shadow: 0 0 10px rgba(255,231,155,.25);
    }

    .code-panel.success {
      box-shadow: 0 0 0 3px rgba(136,243,185,.22), 0 0 24px rgba(136,243,185,.22);
      transform: scale(1.01);
    }

    .code-panel.error {
      animation: shake .45s ease;
    }

    .summary-list,
    .finish-list {
      margin: 8px 0 0;
      padding-right: 1.2em;
    }

    .finish-list li {
      margin-bottom: 8px;
    }

    .video-overlay {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      background: radial-gradient(circle at center, rgba(136,243,185,.08), rgba(0,0,0,.86));
      z-index: 50;
      animation: fadeIn .25s ease;
    }

    .video-overlay.active {
      display: grid;
    }

    .video-frame {
      width: min(1080px, 96vw);
      max-height: 88vh;
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.2);
      box-shadow: 0 0 40px rgba(98,217,255,.18);
      background: #02060f;
    }

    .video-frame video {
      width: 100%;
      height: auto;
      display: block;
      max-height: 88vh;
      object-fit: cover;
    }

    .video-caption {
      margin-top: 12px;
      text-align: center;
      font-size: clamp(1.2rem, 2.5vw, 1.6rem);
      color: #dbfff1;
      text-shadow: 0 0 14px rgba(136,243,185,.7);
      animation: pulseGlow 1.8s ease-in-out infinite;
    }

    .effects-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 25;
    }

    .burst {
      position: absolute;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(136,243,185,.95), rgba(98,217,255,.18));
      animation: burstMove 1s ease forwards;
    }

    .soft-note {
      font-size: .92rem;
      color: rgba(255,255,255,.62);
      margin: 0;
      min-height: 18px;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes pulseGlow {
      50% { transform: scale(1.04); }
    }

    @keyframes logoFloat {
      50% { transform: translateY(-6px); }
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(.96); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes shake {
      25% { transform: translateX(5px); }
      70% { transform: translateX(-5px); }
    }

    @keyframes floatParticle {
      from {
        transform: translateY(40px) scale(.8);
        opacity: 0;
      }
      20% { opacity: .7; }
      to {
        transform: translateY(-140px) scale(1.1);
        opacity: 0;
      }
    }

    @keyframes burstMove {
      to {
        transform: translate(var(--tx), var(--ty)) scale(0);
        opacity: 0;
      }
    }

    @keyframes screenFadeIn {
      from { opacity: 0; transform: translateY(16px) scale(.985); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes lightMove {
      to {
        transform: translate(var(--tx), var(--ty)) scale(0);
        opacity: 0;
      }
    }

    
    .screen.transition-in {
      animation: screenFadeIn .55s ease both;
    }

    .light-flash {
      position: absolute;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,.95), rgba(98,217,255,.15));
      box-shadow: 0 0 24px rgba(136,243,185,.45);
      animation: lightMove 900ms ease forwards;
    }

@media (max-width: 900px) {
      .question-layout {
        grid-template-columns: 1fr;
      }

      .top-strip {
        flex-direction: column;
        align-items: flex-start;
      }

      .btn {
        width: 100%;
      }

      .code-row {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <main class="app" id="app">
    <div class="effects-layer" id="effects-layer"></div>

    <section class="screen active" id="screen-home"></section>
    <section class="screen" id="screen-doors"></section>
    <section class="screen" id="screen-final"></section>
  </main>

  <div class="video-overlay" id="video-overlay" aria-hidden="true">
    <div>
      <div class="video-frame">
        <video id="door-video" src="images/opendoor.mp4" playsinline muted preload="auto"></video>
      </div>
      <div class="video-caption">השער נפתח... נכנסים לעולם חדש ✨</div>
    </div>
  </div>

  <script>
    // ==========================================================

          { stage: 3, code: "TRAIN7", unlocks: "פתיחת דלת 8 והצגת סיכום" }
        ],
        9: [
          { stage: 1, code: "G1", unlocks: "מעבר לשלב 2" },
          { stage: 2, code: "CLIMB", unlocks: "מעבר לשלב 3" },
          { stage: 3, code: "TOP1", unlocks: "פתיחת דלת 9 והצגת סיכום" }
        ],
        10: [
          { stage: 1, code: "LOT2", unlocks: "מעבר לשלב 2" },
          { stage: 2, code: "DRY3", unlocks: "מעבר לשלב 3" },
          { stage: 3, code: "CLEAN9", unlocks: "פתיחת דלת 10 והצגת סיכום" }
        ]
      }
    };

    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxShbtJpFPOl8Jx7T73irGuJdXXc1M469UZNbFf3ByQ1ZSfoRZdvZHwEb2m6QHv26513Q/exec";
    const GAME_ID = "main_game";

      return text.replace(/\n/g, "<br>");
    }

    function setActiveScreen(id) {
      document.querySelectorAll(".screen").forEach(screen => {
        const isTarget = screen.id === id;
        screen.classList.toggle("active", isTarget);
        if (isTarget) {
          screen.classList.remove("transition-in");
          void screen.offsetWidth;
          screen.classList.add("transition-in");
        }
      });
      transitionEffect(id.includes("finish") || id === "screen-final" ? "grand" : "normal");
    }

    function spawnParticles() {
      const container = document.getElementById("hero-particles");
      if (!container) return;
      container.innerHTML = "";
      for (let i = 0; i < 20; i++) {
        const p = document.createElement("div");
        p.className = "particle";
        p.style.left = `${Math.random() * 100}%`;
        p.style.bottom = `${-20 - Math.random() * 60}px`;
        p.style.animationDuration = `${5 + Math.random() * 7}s`;
        p.style.animationDelay = `${Math.random() * 4}s`;
        p.style.opacity = (0.28 + Math.random() * 0.48).toFixed(2);
        container.appendChild(p);
      }
    }

    function burstEffect() {
      for (let i = 0; i < 22; i++) {
        const el = document.createElement("div");
        el.className = "burst";
        el.style.left = `${46 + Math.random() * 8}%`;
        el.style.top = `${38 + Math.random() * 20}%`;
        el.style.setProperty("--tx", `${(Math.random() - 0.5) * 260}px`);
        el.style.setProperty("--ty", `${(Math.random() - 0.5) * 260}px`);
        effectsLayer.appendChild(el);
        setTimeout(() => el.remove(), 1000);
      }
    }

    function transitionEffect(level = "normal") {
      const flashes = level === "grand" ? 36 : 16;
      for (let i = 0; i < flashes; i++) {
        const fx = document.createElement("div");
        fx.className = "light-flash";
        fx.style.left = `${8 + Math.random() * 84}%`;
        fx.style.top = `${8 + Math.random() * 80}%`;
        const spread = level === "grand" ? 360 : 220;
        fx.style.setProperty("--tx", `${(Math.random() - 0.5) * spread}px`);
        fx.style.setProperty("--ty", `${(Math.random() - 0.5) * spread}px`);
        effectsLayer.appendChild(fx);
        setTimeout(() => fx.remove(), 900);
      }
    }

    async function parseScriptResponse(response) {
      const rawText = await response.text();
      if (!rawText) return {};

      try {
        return JSON.parse(rawText);
      } catch {
        return { raw: rawText };
      }
    }

    function normalizeStatus(status) {
      return status === "started" ? "started" : "waiting";
    }

    function updateHomeStatusUI() {
      const unlocked = isUnlocked();
      const waitMessage = document.getElementById("wait-message");
      const startBtn = document.getElementById("start-btn");
      const topStatus = document.getElementById("home-status-text");

      if (waitMessage) waitMessage.classList.toggle("hidden", unlocked);
      if (startBtn) startBtn.classList.toggle("hidden", !unlocked);

      if (topStatus) {
        topStatus.textContent = unlocked ? "המשחק הופעל" : "ממתינים להפעלת מדריך";
      }
    }

    function applyGameStatus(status) {
      state.gameStatus = normalizeStatus(status);
      updateHomeStatusUI();
    }

    async function fetchGameStatus() {
      const statusUrl = `${APPS_SCRIPT_URL}?action=status&game_id=${encodeURIComponent(GAME_ID)}`;
      const response = await fetch(statusUrl, { method: "GET", cache: "no-store" });
      const data = await parseScriptResponse(response);

      if (!response.ok) {
        throw new Error(data?.error || `Status request failed (${response.status})`);
      }

      return normalizeStatus(data?.status);
    }

    async function pollGameStatus() {
      if (state.statusRequestInFlight) return;
      state.statusRequestInFlight = true;

      try {
        const status = await fetchGameStatus();
        applyGameStatus(status);
      } catch (error) {
        console.warn("Game status polling failed:", error);
      } finally {
        state.statusRequestInFlight = false;
      }
    }

    function startStatusPolling() {
      clearInterval(state.statusPollTimer);
      pollGameStatus();
      state.statusPollTimer = setInterval(pollGameStatus, POLL_INTERVAL_MS);
    }

    async function sendGameAction(action, code = "") {
      const payload = new URLSearchParams({
        action,
        game_id: GAME_ID
      });

      if (code) payload.set("code", code);

      const response = await fetch(APPS_SCRIPT_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/x-www-form-urlencoded"
        },
        body: payload.toString()
      });

      const data = await parseScriptResponse(response);
      if (!response.ok) {
        throw new Error(data?.error || `Action request failed (${response.status})`);
      }

      return data;
    }

          <div class="admin-modal" id="guide-modal">
            <div class="modal-card">
              <h3 class="modal-title">אזור מדריך</h3>
              <p class="modal-text">הזינו קוד להפעלה או בצעו איפוס. אימות הקוד מתבצע בשרת בלבד.</p>
              <div class="code-row">
                <input id="guide-code-input" class="input" type="password" placeholder="קוד מדריך" autocomplete="off">
                <button class="btn btn-primary" id="guide-start-btn">הפעל</button>
                <button class="btn btn-secondary" id="guide-reset-btn">איפוס</button>
              </div>
              <p class="feedback" id="guide-feedback"></p>
              <div class="actions">
                <button class="btn btn-secondary" id="guide-close-btn">סגירה</button>
              </div>
            </div>
          </div>

        </div>
      `;

      spawnParticles();

      const heroBg = document.getElementById("hero-bg");
      heroBg.onerror = () => {
        heroBg.style.display = "none";
      };

      const logo = document.getElementById("logo-trigger");
      logo.onerror = () => {
        logo.classList.add("logo-error");
        logo.alt = "שגיאת לוגו";
      };

      const guideModal = document.getElementById("guide-modal");
      const guideCodeInput = document.getElementById("guide-code-input");
      const guideFeedback = document.getElementById("guide-feedback");

      logo.addEventListener("click", () => {
        state.logoTapCount += 1;
        clearTimeout(state.logoTapResetTimer);
        state.logoTapResetTimer = setTimeout(() => {
          state.logoTapCount = 0;
        }, 1400);

        if (state.logoTapCount >= 3) {
          state.logoTapCount = 0;
          guideModal.classList.add("active");
          guideFeedback.textContent = "";
          guideFeedback.className = "feedback";
          guideCodeInput.focus();
        }

      });

      document.getElementById("guide-close-btn").onclick = () => {
        guideModal.classList.remove("active");
      };

      document.getElementById("guide-start-btn").onclick = async () => {
        const value = guideCodeInput.value.trim();
        if (!value) {
          guideFeedback.textContent = "יש להזין קוד לפני הפעלה.";
          guideFeedback.className = "feedback error";
          return;
        }

        try {
          const result = await sendGameAction("start", value);
          const serverAccepted = result?.success === true || result?.ok === true || result?.status === "started" || result?.result === "started";

          if (serverAccepted) {
            applyGameStatus("started");
            guideFeedback.textContent = "המשחק הופעל";
            guideFeedback.className = "feedback success";
            guideCodeInput.value = "";
            burstEffect();
          } else {
            guideFeedback.textContent = "קוד שגוי";
            guideFeedback.className = "feedback error";
          }
        } catch (error) {
          guideFeedback.textContent = "קוד שגוי";
          guideFeedback.className = "feedback error";
        }
      };

      document.getElementById("guide-reset-btn").onclick = async () => {
        try {
          const result = await sendGameAction("reset");
          const serverAccepted = result?.success === true || result?.ok === true || result?.status === "waiting" || result?.result === "waiting";

          if (serverAccepted) {
            applyGameStatus("waiting");
            guideCodeInput.value = "";
            guideFeedback.textContent = "בוצע איפוס. המשחק חזר למצב המתנה.";
            guideFeedback.className = "feedback success";
          } else {
            guideFeedback.textContent = "איפוס נדחה על ידי השרת.";
            guideFeedback.className = "feedback error";
          }
        } catch (error) {
          guideFeedback.textContent = "איפוס נכשל. נסו שוב.";
          guideFeedback.className = "feedback error";
        }
      };

      const startBtn = document.getElementById("start-btn");
      if (startBtn) {
        startBtn.onclick = () => startMainCountdown();
      }

      updateHomeStatusUI();
    }

    function startMainCountdown() {
      const instructionLayer = document.getElementById("instruction-layer");
      const countdown = document.getElementById("countdown");
      const countdownNumber = document.getElementById("countdown-number");

      instructionLayer.classList.add("hidden");
      countdown.classList.add("active");

      let sec = 10;
      countdownNumber.textContent = String(sec);

      const interval = setInterval(() => {
        sec -= 1;
        countdownNumber.textContent = String(sec);

        if (sec <= 0) {
          clearInterval(interval);
          renderDoors();
          setActiveScreen("screen-doors");
        }
      }, 1000);
    }

    function renderDoors() {
      const doorsScreen = document.getElementById("screen-doors");
      const cards = DOORS.map(door => `
        <article class="door-card">
          <div class="door-title">${door.title}</div>
          <div class="door-image-wrap">
            <img
              class="door-image"
              src="${ASSETS.doors[door.id]}"
              alt="${door.title}"
              onerror="this.onerror=null; this.src='${ASSETS.doorFallback}'"
            >
            <div class="door-footer">
              <button class="btn btn-primary" data-door-start="${door.id}">התחל</button>
            </div>
          </div>
        </article>
      `).join("");

      doorsScreen.innerHTML = `
        ${topStrip("מסך הדלתות", "בחרו דלת למשימה")}
        <div class="card doors-card">
          <h2 class="doors-title">בחרו דלת</h2>
          <p class="question-text">לכל דלת מחכה משימה. לחצו על "התחל" כדי לפתוח את המעבר.</p>
          <div class="door-grid">${cards}</div>
          
        </div>
      `;

      doorsScreen.querySelectorAll("[data-door-start]").forEach(btn => {
        btn.onclick = () => startDoorFlow(Number(btn.dataset.doorStart));
      });

    }

    function startDoorFlow(doorId) {
      playDoorVideo(() => {
        renderDoorIntro(doorId);
        setActiveScreen(`door-${doorId}-intro`);
      });
    }

    function playDoorVideo(onDone) {
      videoOverlay.classList.add("active");
      doorVideo.currentTime = 0;

      const finish = () => {
        videoOverlay.classList.remove("active");
        doorVideo.onended = null;
        onDone();
      };

      doorVideo.onended = finish;

      doorVideo.play().catch(() => {
        setTimeout(finish, 2200);
      });
    }

    function ensureDoorSections(doorId) {
      const ids = [
        `door-${doorId}-intro`,
        `door-${doorId}-step-1`,
        `door-${doorId}-step-2`,
        `door-${doorId}-step-3`,
        `door-${doorId}-code-1`,
        `door-${doorId}-code-2`,
        `door-${doorId}-code-3`,
        `door-${doorId}-finish`
      ];

      ids.forEach(id => {
        if (!document.getElementById(id)) {
          const section = document.createElement("section");
          section.className = "screen";
          section.id = id;
          app.appendChild(section);
        }
      });
    }

    function getDoor(doorId) {
      return DOORS.find(d => d.id === doorId);
    }

    function renderDoorIntro(doorId) {
      ensureDoorSections(doorId);
      const door = getDoor(doorId);
      const el = document.getElementById(`door-${doorId}-intro`);

      el.innerHTML = `
        ${topStrip(`${door.title}`, "שלב הכנה")}
        <div class="card question-card">
          <div class="question-layout">
            <div class="question-visual">
              <img src="${ASSETS.doors[door.id]}" alt="${door.title}" onerror="this.style.display='none'">
            </div>

            <div>
              <h2 class="question-title">מתכוננים ל${door.title}</h2>
              <p class="question-text">הכינו את הצוות למשימה מסקרנת,
שימו לב לפרטים, וגלו יחד את הרמזים שיובילו לפתיחה.</p>

              <div class="actions">
                <button class="btn btn-primary" id="door-${doorId}-to-step1">לתחילת שלב 1</button>
                <button class="btn btn-secondary" id="door-${doorId}-back-doors">חזרה לדלתות</button>
              </div>
            </div>
          </div>
        </div>
      `;

      document.getElementById(`door-${doorId}-to-step1`).onclick = () => renderStep(doorId, 1);
      document.getElementById(`door-${doorId}-back-doors`).onclick = () => setActiveScreen("screen-doors");
    }

    function renderStep(doorId, stepIndex) {
      ensureDoorSections(doorId);
      const door = getDoor(doorId);
      const step = door.steps[stepIndex - 1];
      const el = document.getElementById(`door-${doorId}-step-${stepIndex}`);

      el.innerHTML = `
        ${topStrip(`${door.title}`, `שלב ${stepIndex} מתוך 3`)}
        <div class="card question-card">
          <div class="question-layout">
            <div class="question-visual">
              <img src="${ASSETS.doors[door.id]}" alt="${door.title}" onerror="this.style.display='none'">
            </div>

            <div>
              <h2 class="question-title">${step.title}</h2>
              <p class="question-text">${nl(step.question)}</p>

              <div class="answers">
                ${step.options.map(option => `<button class="answer" data-answer="${option}">${option}</button>`).join("")}
              </div>

              <p class="feedback" id="door-${doorId}-step-${stepIndex}-feedback"></p>

              <div class="actions">
                <button class="btn btn-next hidden" id="door-${doorId}-step-${stepIndex}-next">לשלב הבא</button>
                <button class="btn btn-secondary" id="door-${doorId}-step-${stepIndex}-back">חזרה לדלתות</button>
              </div>
            </div>
          </div>
        </div>
      `;

      const feedback = document.getElementById(`door-${doorId}-step-${stepIndex}-feedback`);
      const nextBtn = document.getElementById(`door-${doorId}-step-${stepIndex}-next`);

      el.querySelectorAll(".answer").forEach(btn => {
        btn.onclick = () => {
          const chosen = btn.dataset.answer;
          const isCorrect = chosen === step.answer;

          el.querySelectorAll(".answer").forEach(answerBtn => {
            answerBtn.classList.remove("correct", "wrong");
          });

          btn.classList.add(isCorrect ? "correct" : "wrong");

          if (isCorrect) {
            feedback.textContent = "מעולה! עניתם נכון";
            feedback.className = "feedback success";
            burstEffect();
            nextBtn.classList.remove("hidden");
            renderCodeScreen(doorId, stepIndex);
            nextBtn.onclick = () => setActiveScreen(`door-${doorId}-code-${stepIndex}`);
          } else {
            feedback.textContent = "כמעט. זו לא התשובה הנכונה. נסו שוב יחד.";
            feedback.className = "feedback error";
          }
        };
      });

      document.getElementById(`door-${doorId}-step-${stepIndex}-back`).onclick = () => setActiveScreen("screen-doors");
      setActiveScreen(`door-${doorId}-step-${stepIndex}`);
    }

    function renderCodeScreen(doorId, codeStage) {
      ensureDoorSections(doorId);
      const door = getDoor(doorId);
      const screenId = `door-${doorId}-code-${codeStage}`;
      const el = document.getElementById(screenId);
      const finalStage = codeStage === 3;
      const expectedCode = door.codes[codeStage - 1];

      el.innerHTML = `
        ${topStrip(`${door.title}`, `בדיקת קוד ${codeStage} מתוך 3`)}
        <div class="card question-card">
          <div class="question-layout">
            <div class="question-visual">
              <img src="${ASSETS.doors[door.id]}" alt="${door.title}" onerror="this.style.display='none'">
            </div>

            <div>
              <h2 class="question-title">מסך קוד מיוחד ✨</h2>
              <p class="question-text">סופר-רגע של פתיחה! הזינו את הקוד שקיבלתם מהמדריך ולחצו על "פתיחה".</p>

              <div class="code-panel" id="code-panel-${doorId}-${codeStage}">
                <h3 class="code-title">שער קוד שלב ${codeStage}</h3>
                <div class="code-row">
                  <input class="input" id="code-input-${doorId}-${codeStage}" type="password" placeholder="הזינו קוד" autocomplete="off">
                  <button class="btn btn-primary" id="code-submit-${doorId}-${codeStage}">פתיחה</button>
                </div>
              </div>

              <p class="feedback" id="code-feedback-${doorId}-${codeStage}"></p>

              <div class="actions">
                <button class="btn btn-next hidden" id="code-next-${doorId}-${codeStage}">לשלב הבא</button>
                <button class="btn btn-secondary" id="code-back-${doorId}-${codeStage}">חזרה לדלתות</button>
              </div>
            </div>
          </div>
        </div>
      `;

      const panel = document.getElementById(`code-panel-${doorId}-${codeStage}`);
      const input = document.getElementById(`code-input-${doorId}-${codeStage}`);
      const feedback = document.getElementById(`code-feedback-${doorId}-${codeStage}`);
      const nextBtn = document.getElementById(`code-next-${doorId}-${codeStage}`);

      document.getElementById(`code-submit-${doorId}-${codeStage}`).onclick = () => {
        const entered = input.value.trim().toUpperCase();
        panel.classList.remove("success", "error");

        if (entered === expectedCode) {
          panel.classList.add("success");
          feedback.textContent = "איזה יופי! הקוד נכון והדלת נפתחת לשלב הבא ✨";
          feedback.className = "feedback success";
          burstEffect();
          nextBtn.classList.remove("hidden");

          nextBtn.onclick = () => {
            if (finalStage) {
              renderDoorFinish(doorId);
              setActiveScreen(`door-${doorId}-finish`);
            } else {
              renderStep(doorId, codeStage + 1);
            }
          };
        } else {
          panel.classList.add("error");
          feedback.textContent = "זה עדיין לא הקוד הנכון. נסו שוב עם הצוות.";
          feedback.className = "feedback error";
        }
      };

      document.getElementById(`code-back-${doorId}-${codeStage}`).onclick = () => setActiveScreen("screen-doors");
    }

    function renderDoorFinish(doorId) {
      ensureDoorSections(doorId);
      state.completedDoors.add(doorId);
      const door = getDoor(doorId);
      const el = document.getElementById(`door-${doorId}-finish`);

      el.innerHTML = `
        ${topStrip(`${door.title}`, "הצלחה")}
        <div class="card finish-card">
          <h2 class="finish-title">נהדר! ${door.title} נפתחה בהצלחה ✨</h2>
          <p class="question-text">סיכום קצר של מה שגיליתם:</p>
          <ul class="finish-list">
            ${door.summary.map(item => `<li>${item}</li>`).join("")}
          </ul>

          <div class="actions">
            <button class="btn btn-primary" id="door-${doorId}-finish-back-doors">חזרה למסך הדלתות</button>
          </div>
        </div>
      `;

      document.getElementById(`door-${doorId}-finish-back-doors`).onclick = () => {
        renderDoors();
        setActiveScreen("screen-doors");
      };

    }

    function renderFinal() {
      const finalScreen = document.getElementById("screen-final");

      finalScreen.innerHTML = `
        ${topStrip("סיום", `דלתות שהושלמו: ${state.completedDoors.size}`)}
        <div class="card finish-card">
          <h2 class="finish-title">פיצחתם את קוד הטבע 🎉</h2>
          <p class="question-text">למדתם איך הטבע נותן השראה לרעיונות, לפתרונות ולהמצאות חדשות.</p>

          <div class="actions">
            <button class="btn btn-primary" id="final-back-doors">חזרה למסך הדלתות</button>
          </div>
        </div>
      `;

      document.getElementById("final-back-doors").onclick = () => {
        renderDoors();
        setActiveScreen("screen-doors");
      };

    }

    renderHome();
    startStatusPolling();
  </script>
</body>
</html>
