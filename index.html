<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>דלתות הטבע: חדר בריחה ביומימטי בזום</title>
  <style>
    :root {
      --bg: #050916;
      --bg-2: #111b3b;
      --panel: rgba(12, 22, 48, 0.9);
      --text: #eff4ff;
      --muted: #b2c1e3;
      --accent: #52d6ff;
      --accent-2: #7df3ad;
      --danger: #ff8098;
      --radius: 20px;
      --ease: 780ms cubic-bezier(.22,.61,.36,1);
    }

    * { box-sizing: border-box; font-family: "Assistant", "Rubik", sans-serif; }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at 20% 5%, #2a4a93, transparent 35%), linear-gradient(160deg, var(--bg-2), var(--bg));
      color: var(--text);
      padding: 16px;
    }

    .game-shell {
      width: min(1300px, 100%);
      margin-inline: auto;
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.14);
      box-shadow: 0 20px 44px rgba(0,0,0,.35);
      background: rgba(8, 14, 32, .55);
      position: relative;
    }

    .screen { display: none; min-height: 85vh; padding: clamp(16px, 2.7vw, 34px); }
    .screen.active { display: block; animation: fadeSlide .95s var(--ease); }

    .top-strip {
      display: flex; justify-content: space-between; gap: 10px; align-items: center;
      padding: 10px 14px; margin-bottom: 14px;
      border-radius: 12px; background: rgba(255,255,255,.08); color: var(--muted);
      border: 1px solid rgba(255,255,255,.16);
      font-size: 1.05rem;
    }

    .card {
      background: var(--panel);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: var(--radius);
      padding: clamp(18px, 2.8vw, 30px);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08);
    }

    .intro-hero {
      min-height: 72vh;
      display: grid;
      place-items: center;
      position: relative;
      overflow: hidden;
      text-align: center;
      padding: 0;
    }
    .intro-hero > img {
      position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
      filter: brightness(.6) saturate(1.08);
    }
    .intro-overlay { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(0,0,0,.18), rgba(0,0,0,.55)); }
    .intro-box {
      position: relative; z-index: 2; width: min(830px, 94%);
      background: rgba(5, 10, 24, .66); border-radius: 20px; padding: 22px;
      border: 1px solid rgba(255,255,255,.18); backdrop-filter: blur(6px);
      display: grid; gap: 8px;
    }
    .intro-logo-wrap {
      display: flex; justify-content: center; margin-bottom: 6px;
    }
    .intro-logo {
      width: clamp(72px, 10vw, 110px);
      height: clamp(72px, 10vw, 110px);
      cursor: pointer;
      transition: transform .3s ease;
      border-radius: 100%;
    }
    .intro-logo:active { transform: scale(.95); }
    .logo-hint {
      margin: 0;
      min-height: 22px;
      color: var(--accent-2);
      font-size: 1rem;
      opacity: 0;
      transition: opacity .4s ease;
    }
    .logo-hint.show { opacity: .94; }

    .intro-box.hidden { display: none; }
    .intro-box h1 { font-size: clamp(2.2rem, 5.9vw, 3.8rem); margin: 0 0 .2em; }
    .intro-box p { font-size: clamp(1.26rem, 2.55vw, 1.7rem); line-height: 1.9; margin: 0 0 .4em; }

    .wait-message {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin: 4px auto 0;
      width: fit-content;
      border-radius: 12px;
      padding: 10px 18px;
      font-size: clamp(1.08rem, 2.4vw, 1.32rem);
      background: rgba(255, 255, 255, .08);
      border: 1px solid rgba(255,255,255,.2);
    }
    .wait-message.hidden,
    .btn.hidden,
    .admin-modal.hidden { display: none; }

    .countdown {
      position: absolute; z-index: 3; display: none; text-align: center;
      font-size: clamp(4.5rem, 17vw, 11rem); font-weight: 800;
      text-shadow: 0 0 34px rgba(82,214,255,.88);
      animation: pulseGlow 1s ease-in-out infinite;
      background: rgba(5,10,24,.45);
      padding: 18px 34px;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,.2);
    }
    .countdown.active { display: block; }
    .countdown small { display: block; font-size: clamp(1.2rem, 2.6vw, 1.6rem); margin-top: 8px; }

    .admin-modal {
      position: absolute;
      z-index: 25;
      inset: 0;
      background: rgba(3, 7, 20, .66);
      display: grid;
      place-items: center;
      animation: fade .45s ease;
    }

    .modal-card {
      width: min(420px, 92%);
      background: rgba(8,14,32,.95);
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 16px;
      padding: 20px;
      text-align: right;
      box-shadow: 0 18px 40px rgba(0,0,0,.4);
    }
    .modal-card h3 { margin: 0 0 12px; font-size: 1.5rem; }

    .door-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 18px; margin-top: 20px; }
    .door-card {
      border: 1px solid rgba(141, 226, 255, .55);
      background: linear-gradient(165deg, rgba(37,58,115,.62), rgba(12,22,50,.86));
      border-radius: 20px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform var(--ease), box-shadow var(--ease), border-color var(--ease);
    }
    .door-card:hover { transform: translateY(-7px) scale(1.015); box-shadow: 0 0 38px rgba(82,214,255,.34); border-color: var(--accent); }
    .door-title { text-align: center; font-weight: 800; font-size: 1.38rem; padding: 10px; }
    .door-image-wrap { position: relative; aspect-ratio: 4/5; }
    .door-image-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .door-footer {
      position: absolute; inset-inline: 0; bottom: 0;
      padding: 10px;
      display: flex; justify-content: center;
      background: linear-gradient(to top, rgba(5,10,24,.82), rgba(5,10,24,.1));
    }

    .question-layout { display: grid; grid-template-columns: minmax(270px, 40%) 1fr; gap: 24px; }
    .question-visual { display: grid; place-items: center; border-radius: 16px; border: 1px solid rgba(255,255,255,.16); background: rgba(255,255,255,.04); }
    .question-visual img { width: 100%; max-width: 320px; }
    .question-content h2 { font-size: clamp(2.1rem, 4.2vw, 2.7rem); margin: 0 0 .35em; }
    .question-text { font-size: clamp(1.34rem, 2.9vw, 1.8rem); line-height: 1.95; margin-bottom: 16px; max-width: 28em; }
    .answers { display: grid; gap: 12px; }
    .answer {
      border: 1px solid rgba(255,255,255,.2);
      background: linear-gradient(145deg, #263975, #1a2856);
      color: var(--text); border-radius: 14px;
      padding: 17px; font-size: 1.26rem; text-align: right; cursor: pointer;
      transition: transform .45s ease, border-color .45s ease;
    }
    .answer:hover { transform: translateX(-3px); border-color: var(--accent); }
    .answer.correct { background: rgba(125,243,173,.24); border-color: var(--accent-2); box-shadow: 0 0 24px rgba(125,243,173,.28); }
    .answer.wrong { background: rgba(255,128,152,.16); border-color: var(--danger); animation: shake .5s ease; }

    .feedback { min-height: 30px; margin-top: 12px; font-size: 1.24rem; font-weight: 700; }
    .feedback.success { color: var(--accent-2); text-shadow: 0 0 14px rgba(125,243,173,.6); }
    .feedback.error { color: var(--danger); }

    .code-panel { border: 1px solid rgba(255,255,255,.2); border-radius: 14px; padding: 16px; background: rgba(255,255,255,.05); transition: box-shadow .45s ease; }
    .code-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .code-input {
      flex: 1 1 220px; min-height: 46px; border-radius: 12px; border: 1px solid rgba(255,255,255,.3);
      background: #0f1733; color: var(--text); font-size: 1.15rem; padding: 8px 12px; text-transform: uppercase;
    }
    .code-panel.success { box-shadow: 0 0 0 3px rgba(125,243,173,.25), 0 0 26px rgba(125,243,173,.35); }
    .code-panel.error { animation: shake .5s ease; }

    .btn {
      border: none; border-radius: 12px; cursor: pointer; font-weight: 800;
      padding: 11px 18px; min-height: 44px; font-size: 1rem;
      transition: transform .35s ease, filter .35s ease;
    }
    .btn:hover { transform: translateY(-2px); filter: brightness(1.06); }
    .btn:active { transform: scale(.98); }
    .btn-primary { background: linear-gradient(135deg, var(--accent), #22b7ff); color: #031024; }
    .btn-secondary { background: #2b3762; color: var(--text); border: 1px solid rgba(255,255,255,.2); }
    .btn-next { background: linear-gradient(135deg, #7df3ad, #52d6ff); color: #031124; }

    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }

    .effects-layer { pointer-events: none; position: absolute; inset: 0; overflow: hidden; z-index: 20; }
    .effect-burst {
      position: absolute;
      width: 18px; height: 18px; border-radius: 50%;
      background: radial-gradient(circle, rgba(125,243,173,.95), rgba(82,214,255,.2));
      animation: burst 1s ease forwards;
    }

    @keyframes burst { to { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; } }
    @keyframes fadeSlide { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
    @keyframes shake { 25% { transform: translateX(4px); } 70% { transform: translateX(-4px); } }
    @keyframes pulseGlow { 50% { transform: scale(1.06); text-shadow: 0 0 48px rgba(82,214,255,1); } }

    @media (max-width: 850px) {
      .question-layout { grid-template-columns: 1fr; }
      .btn { width: 100%; }
      .code-row { flex-direction: column; }
      .top-strip { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <main class="game-shell" id="app" aria-live="polite">
    <div class="effects-layer" id="effects-layer"></div>
    <section id="screen-home" class="screen active"></section>
    <section id="screen-doors" class="screen"></section>
    <section id="screen-final" class="screen"></section>
  </main>

  <script>
    const ADMIN_CODE = "BIO2024";
    const UNLOCK_DURATION_MS = 15 * 60 * 1000;

    const imagePaths = {
      home: "images/game-intro.svg",
      logo: "images/logo.svg",
      doorDefault: "images/door-active.svg",
      doorLocked: "images/door-locked.svg",
      creatures: { 1: "images/gecko.svg", 2: "images/lotus.svg", 3: "images/bat.svg", 4: "images/kingfisher.svg" },
      doors: Object.fromEntries(Array.from({ length: 10 }, (_, i) => [i + 1, `images/door${i + 1}.svg`]))
    };

    const content = {
      doors: [
        { id: 1, name: "שממית", image: imagePaths.creatures[1], intro: "מאחורי הדלת מחכה שממית עם כוח־על מפתיע.\nתגלו מה היא יודעת לעשות,\nואיך בני אדם מפתחים מזה מוצר חדש.", codes: ["G1", "CLIMB", "TOP1"], steps: [
          { title: "שלב 1 – מי אני?", question: "אני מטפסת על קירות\nוגם על תקרה בלי ליפול.\nמי אני?", options: ["שממית", "עטלף", "קיפוד"], answer: "שממית" },
          { title: "שלב 2 – מה זה עוזר לי לעשות?", question: "למה היכולת הזאת חשובה בטבע?", options: ["להיצמד ולטפס", "לשחות עמוק", "להסתתר מהשמש"], answer: "להיצמד ולטפס" },
          { title: "שלב 3 – מה אפשר לפתח בהשראה?", question: "איזה מוצר אפשר לפתח\nבהשראת היכולת הזאת?", options: ["דבק חכם או רובוט מטפס", "פנס לילה", "בקבוק מים"], answer: "דבק חכם או רובוט מטפס" }
        ], summary: ["אורגניזם: שממית", "כוח־על: היצמדות למשטחים", "השראה למוצר: דבק חכם / רובוט מטפס"] },
        { id: 2, name: "לוטוס", image: imagePaths.creatures[2], intro: "הפעם תגלו את סוד הלוטוס.\nאיך עלים נשארים נקיים?\nומה בני אדם למדו מזה?", codes: ["LOT2", "DRY3", "CLEAN9"], steps: [
          { title: "שלב 1 – מי אני?", question: "אני צמח מים.\nהעלים שלי נשארים נקיים\nכי מים מחליקים מהם. מי אני?", options: ["לוטוס", "קקטוס", "ורד"], answer: "לוטוס" },
          { title: "שלב 2 – למה זה עוזר?", question: "מה היתרון בטבע?", options: ["שמירה על ניקיון העלים", "משיכת ציפורים", "יצירת צל"], answer: "שמירה על ניקיון העלים" },
          { title: "שלב 3 – מוצר בהשראה", question: "מה בני אדם פיתחו מזה?", options: ["ציפוי דוחה מים", "כרית שינה", "זכוכית כהה"], answer: "ציפוי דוחה מים" }
        ], summary: ["אורגניזם: לוטוס", "כוח־על: דחיית מים ולכלוך", "השראה למוצר: ציפויים מתנקים"] },
        { id: 3, name: "עטלף", image: imagePaths.creatures[3], intro: "בדלת הזו מסתתר עטלף.\nתגלו איך הוא נע בחושך\nבלי להתנגש בכלל.", codes: ["BAT3", "ECHO", "SON7"], steps: [
          { title: "שלב 1 – מי אני?", question: "אני עף בלילה\nומשתמש בקולות והד\nכדי לדעת מה סביבי. מי אני?", options: ["עטלף", "ינשוף", "דולפין"], answer: "עטלף" },
          { title: "שלב 2 – למה זה עוזר?", question: "מה זה נותן לי בטבע?", options: ["לנוע בחושך", "להחליף צבעים", "להישאר יבש"], answer: "לנוע בחושך" },
          { title: "שלב 3 – השראה למוצר", question: "איזו טכנולוגיה נוצרה\nבהשראת היכולת הזאת?", options: ["מערכת סונאר", "מחברת חכמה", "מטרייה מתקפלת"], answer: "מערכת סונאר" }
        ], summary: ["אורגניזם: עטלף", "כוח־על: ניווט באמצעות הד", "השראה למוצר: סונאר וחיישני מרחק"] },
        { id: 4, name: "שלדג", image: imagePaths.creatures[4], intro: "בדלת הזו מחכה שלדג מהיר.\nנבין איך הוא נכנס למים\nכמעט בלי רעש והתזה.", codes: ["KING4", "SPEED", "TRAIN7"], steps: [
          { title: "שלב 1 – מי אני?", question: "אני ציפור שצוללת למים\nלתפוס דגים במהירות. מי אני?", options: ["שלדג", "נשר", "יונה"], answer: "שלדג" },
          { title: "שלב 2 – למה זה עוזר?", question: "מה היתרון של מקור חד וארוך?", options: ["כניסה שקטה למים", "תעופה לעננים", "שמירת חום"], answer: "כניסה שקטה למים" },
          { title: "שלב 3 – השראה למוצר", question: "איזו טכנולוגיה קיבלה השראה מהשלדג?", options: ["רכבת מהירה ושקטה", "מזלג מתקפל", "מחברת קשיחה"], answer: "רכבת מהירה ושקטה" }
        ], summary: ["אורגניזם: שלדג", "כוח־על: חדירה שקטה למים", "השראה למוצר: רכבות יעילות ושקטות"] }
      ]
    };

    const app = document.getElementById("app");
    const effectsLayer = document.getElementById("effects-layer");
    const state = {
      completedDoors: new Set(),
      isUnlocked: false,
      unlockUntil: 0,
      unlockTimer: null,
      logoTapCount: 0,
      logoTapTimer: null
    };

    const topStrip = (doorName, progress) => `<div class="top-strip"><div><strong>${doorName}</strong></div><div>${progress}</div></div>`;
    const toLines = (txt) => txt.split("\n").join("<br>");
    const getDoor = (id) => content.doors.find((d) => d.id === id) || content.doors[(id - 1) % content.doors.length];

    function showScreen(id) {
      document.querySelectorAll(".screen").forEach((s) => s.classList.toggle("active", s.id === id));
    }

    function spawnSuccessBurst() {
      for (let i = 0; i < 18; i++) {
        const p = document.createElement("div");
        p.className = "effect-burst";
        p.style.left = `${45 + Math.random() * 10}%`;
        p.style.top = `${40 + Math.random() * 20}%`;
        p.style.setProperty("--tx", `${(Math.random() - .5) * 220}px`);
        p.style.setProperty("--ty", `${(Math.random() - .5) * 220}px`);
        effectsLayer.appendChild(p);
        setTimeout(() => p.remove(), 1000);
      }
    }

    function unlockGame() {
      state.isUnlocked = true;
      state.unlockUntil = Date.now() + UNLOCK_DURATION_MS;
      clearTimeout(state.unlockTimer);
      state.unlockTimer = setTimeout(() => {
        state.isUnlocked = false;
        state.unlockUntil = 0;
        renderHome();
      }, UNLOCK_DURATION_MS);
      renderHome();
    }

    function remainingUnlockMinutes() {
      if (!state.isUnlocked) return 0;
      return Math.max(0, Math.ceil((state.unlockUntil - Date.now()) / 60000));
    }

    function ensureDoorSections(doorId) {
      ["intro", "step-1", "step-2", "step-3", "code-1", "code-2", "code-3", "finish"].forEach((part) => {
        const id = `door-${doorId}-${part}`;
        if (!document.getElementById(id)) {
          const section = document.createElement("section");
          section.id = id;
          section.className = "screen";
          app.appendChild(section);
        }
      });
    }

    function renderHome() {
      const el = document.getElementById("screen-home");
      const isUnlocked = state.isUnlocked && Date.now() < state.unlockUntil;
      el.innerHTML = `
        ${topStrip("דלתות הטבע", isUnlocked ? `שחרור מדריך פעיל לעוד ${remainingUnlockMinutes()} דקות` : "מסך פתיחה")}
        <div class="card intro-hero">
          <img src="${imagePaths.home}" alt="רקע פתיחה">
          <div class="intro-overlay"></div>
          <div class="intro-box" id="intro-box">
            <div class="intro-logo-wrap"><img src="${imagePaths.logo}" alt="לוגו" class="intro-logo" id="logo-trigger"></div>
            <p id="logo-hint" class="logo-hint">חלון מדריכים נפתח</p>
            <h1>דלתות הטבע</h1>
            <p>ברוכים הבאים לחדר הבריחה הביומימטי.<br>קראו את ההוראות, ואז התחילו במשימה.</p>
            <p>בחרו דלת, פתרו 3 שלבים,<br>וקבלו קוד מהמדריך בזום כדי להתקדם.</p>
            <p class="wait-message ${isUnlocked ? "hidden" : ""}" id="wait-message">אנא המתינו - מיד מתחילים.</p>
            <button class="btn btn-primary ${isUnlocked ? "" : "hidden"}" id="start-btn">התחילו במשימה</button>
          </div>
          <div class="countdown" id="countdown">10<small>המשימה מתחילה עכשיו</small></div>
          <div class="admin-modal hidden" id="admin-modal">
            <div class="modal-card">
              <h3>אישור מדריכים</h3>
              <p>הזינו קוד מנהל לשחרור המשחק ל־15 דקות.</p>
              <div class="code-row">
                <input class="code-input" id="admin-code-input" placeholder="קוד מנהל" autocomplete="off">
                <button class="btn btn-primary" id="admin-submit">אישור</button>
              </div>
              <p id="admin-feedback" class="feedback"></p>
              <div class="actions">
                <button class="btn btn-secondary" id="admin-close">סגירה</button>
              </div>
            </div>
          </div>
        </div>`;

      const startBtn = document.getElementById("start-btn");
      if (startBtn) {
        startBtn.onclick = () => {
          const box = document.getElementById("intro-box");
          const countdown = document.getElementById("countdown");
          box.classList.add("hidden");
          countdown.classList.add("active");
          let sec = 10;
          countdown.firstChild.nodeValue = String(sec);
          const timer = setInterval(() => {
            sec -= 1;
            countdown.firstChild.nodeValue = String(sec);
            if (sec === 0) {
              clearInterval(timer);
              renderDoors();
              showScreen("screen-doors");
            }
          }, 1000);
        };
      }

      const logo = document.getElementById("logo-trigger");
      const hint = document.getElementById("logo-hint");
      const adminModal = document.getElementById("admin-modal");
      const adminFb = document.getElementById("admin-feedback");

      logo.onclick = () => {
        state.logoTapCount += 1;
        clearTimeout(state.logoTapTimer);
        state.logoTapTimer = setTimeout(() => { state.logoTapCount = 0; }, 1400);
        if (state.logoTapCount >= 4) {
          state.logoTapCount = 0;
          hint.classList.add("show");
          adminModal.classList.remove("hidden");
          setTimeout(() => hint.classList.remove("show"), 1600);
        }
      };

      document.getElementById("admin-close").onclick = () => {
        adminModal.classList.add("hidden");
        adminFb.textContent = "";
      };

      document.getElementById("admin-submit").onclick = () => {
        const code = document.getElementById("admin-code-input").value.trim();
        if (code === ADMIN_CODE) {
          adminFb.className = "feedback success";
          adminFb.textContent = "אושר בהצלחה! המשימה פתוחה ל־15 דקות.";
          spawnSuccessBurst();
          setTimeout(() => {
            adminModal.classList.add("hidden");
            unlockGame();
          }, 600);
        } else {
          adminFb.className = "feedback error";
          adminFb.textContent = "קוד שגוי. נסו שוב בעדינות 🙂";
        }
      };
    }

    function renderDoors() {
      const cards = Array.from({ length: 10 }, (_, i) => i + 1).map((num) => `
        <article class="door-card">
          <div class="door-title">דלת ${num}</div>
          <div class="door-image-wrap">
            <img src="${imagePaths.doors[num]}" onerror="this.src='${imagePaths.doorDefault}'" alt="דלת ${num}">
            <div class="door-footer"><button class="btn btn-primary" data-start="${num}">התחל</button></div>
          </div>
        </article>`).join("");

      const el = document.getElementById("screen-doors");
      el.innerHTML = `
        ${topStrip("מסך הדלתות", "בחרו שער למשימה")}
        <div class="card">
          <h2>בחרו דלת</h2>
          <p class="question-text">לכל דלת משימה אחרת. לחצו על "התחל" כדי להיכנס.</p>
          <div class="door-grid">${cards}</div>
          <div class="actions"><button class="btn btn-secondary" id="go-final">למסך סיום</button></div>
        </div>`;

      el.querySelectorAll("[data-start]").forEach((b) => b.onclick = () => startDoor(Number(b.dataset.start)));
      document.getElementById("go-final").onclick = () => { renderFinal(); showScreen("screen-final"); };
    }

    function startDoor(doorId) {
      ensureDoorSections(doorId);
      renderDoorIntro(doorId);
      showScreen(`door-${doorId}-intro`);
    }

    function renderDoorIntro(doorId) {
      const d = getDoor(doorId);
      const el = document.getElementById(`door-${doorId}-intro`);
      el.innerHTML = `${topStrip(`דלת ${doorId}`, "שלב הכנה")}
      <div class="card">
        <div class="question-layout">
          <div class="question-visual"><img src="${imagePaths.doorLocked}" alt="דלת סגורה"></div>
          <div class="question-content">
            <h2>מתכוננים לדלת ${doorId}</h2>
            <p class="question-text">${toLines(d.intro)}</p>
            <div class="actions">
              <button class="btn btn-primary" id="to-step1-${doorId}">לתחילת שלב 1</button>
              <button class="btn btn-secondary" id="back-doors-${doorId}">חזרה לדלתות</button>
            </div>
          </div>
        </div>
      </div>`;
      document.getElementById(`to-step1-${doorId}`).onclick = () => renderStep(doorId, 1);
      document.getElementById(`back-doors-${doorId}`).onclick = () => showScreen("screen-doors");
    }

    function renderStep(doorId, stepNum) {
      const d = getDoor(doorId);
      const step = d.steps[stepNum - 1];
      const el = document.getElementById(`door-${doorId}-step-${stepNum}`);
      const nextCodeScreen = `door-${doorId}-code-${stepNum}`;

      el.innerHTML = `${topStrip(`דלת ${doorId}`, `שלב ${stepNum} מתוך 3`)}
      <div class="card">
        <div class="question-layout">
          <div class="question-visual"><img src="${stepNum === 1 ? imagePaths.doorLocked : d.image}" alt="איור"></div>
          <div class="question-content">
            <h2>${step.title}</h2>
            <p class="question-text">${toLines(step.question)}</p>
            <div class="answers">${step.options.map((o) => `<button class="answer" data-opt="${o}">${o}</button>`).join("")}</div>
            <p class="feedback" id="fb-${doorId}-${stepNum}"></p>
            <div class="actions">
              <button class="btn btn-next" id="next-${doorId}-${stepNum}" style="display:none">לשלב הבא</button>
              <button class="btn btn-secondary" id="back-doors-s-${doorId}-${stepNum}">חזרה לדלתות</button>
            </div>
          </div>
        </div>
      </div>`;

      const feedback = document.getElementById(`fb-${doorId}-${stepNum}`);
      const nextBtn = document.getElementById(`next-${doorId}-${stepNum}`);

      el.querySelectorAll(".answer").forEach((btn) => {
        btn.onclick = () => {
          const good = btn.dataset.opt === step.answer;
          el.querySelectorAll(".answer").forEach((b) => b.classList.remove("correct", "wrong"));
          btn.classList.add(good ? "correct" : "wrong");
          if (good) {
            feedback.textContent = "מצוין! מצאתם את הרעיון הנכון. קראו בנחת ואז לחצו לשלב הבא.";
            feedback.className = "feedback success";
            nextBtn.style.display = "inline-block";
            renderCodeScreen(doorId, stepNum);
            nextBtn.onclick = () => showScreen(nextCodeScreen);
          } else {
            feedback.textContent = "כמעט! המנגנון עדיין לא נפתח. חשבו שוב כמו הטבע 🙂";
            feedback.className = "feedback error";
          }
        };
      });

      document.getElementById(`back-doors-s-${doorId}-${stepNum}`).onclick = () => showScreen("screen-doors");
      showScreen(`door-${doorId}-step-${stepNum}`);
    }

    function renderCodeScreen(doorId, codeNum) {
      const d = getDoor(doorId);
      const el = document.getElementById(`door-${doorId}-code-${codeNum}`);
      const isLast = codeNum === 3;

      el.innerHTML = `${topStrip(`דלת ${doorId}`, `בדיקת קוד ${codeNum} מתוך 3`)}
      <div class="card">
        <div class="question-layout">
          <div class="question-visual"><img src="${imagePaths.doorDefault}" alt="דלת נפתחת"></div>
          <div class="question-content">
            <h2>מסך קוד</h2>
            <p class="question-text">קיבלתם קוד מהמדריך? הזינו אותו ולחצו "פתיחה".</p>
            <div class="code-panel" id="code-panel-${doorId}-${codeNum}">
              <div class="code-row">
                <input class="code-input" id="code-input-${doorId}-${codeNum}" placeholder="לדוגמה: ABC1" autocomplete="off">
                <button class="btn btn-primary" id="submit-${doorId}-${codeNum}">פתיחה</button>
              </div>
            </div>
            <p class="feedback" id="code-fb-${doorId}-${codeNum}"></p>
            <div class="actions">
              <button class="btn btn-next" id="code-next-${doorId}-${codeNum}" style="display:none">לשלב הבא</button>
              <button class="btn btn-secondary" id="code-back-${doorId}-${codeNum}">חזרה לדלתות</button>
            </div>
          </div>
        </div>
      </div>`;

      document.getElementById(`submit-${doorId}-${codeNum}`).onclick = () => {
        const entered = document.getElementById(`code-input-${doorId}-${codeNum}`).value.trim().toUpperCase();
        const fb = document.getElementById(`code-fb-${doorId}-${codeNum}`);
        const panel = document.getElementById(`code-panel-${doorId}-${codeNum}`);
        const next = document.getElementById(`code-next-${doorId}-${codeNum}`);
        panel.classList.remove("success", "error");

        if (entered === d.codes[codeNum - 1]) {
          panel.classList.add("success");
          spawnSuccessBurst();
          fb.textContent = "איזה יופי! גיליתם את הסוד – הדלת נפתחת והטבע חושף רמז חדש ✨";
          fb.className = "feedback success";
          next.style.display = "inline-block";
          next.onclick = () => {
            if (isLast) {
              renderDoorFinish(doorId);
              showScreen(`door-${doorId}-finish`);
            } else {
              renderStep(doorId, codeNum + 1);
            }
          };
        } else {
          panel.classList.add("error");
          fb.textContent = "הקוד עדיין לא פתח את הדלת. נסו שוב יחד עם הצוות 💡";
          fb.className = "feedback error";
        }
      };

      document.getElementById(`code-back-${doorId}-${codeNum}`).onclick = () => showScreen("screen-doors");
    }

    function renderDoorFinish(doorId) {
      const d = getDoor(doorId);
      state.completedDoors.add(doorId);
      const el = document.getElementById(`door-${doorId}-finish`);
      el.innerHTML = `${topStrip(`דלת ${doorId}`, "הצלחה")}
      <div class="card">
        <h2>הצלחתם! דלת ${doorId} נפתחה</h2>
        <p class="question-text">סיכום קצר של מה שגיליתם:</p>
        <ul>${d.summary.map((s) => `<li>${s}</li>`).join("")}</ul>
        <div class="actions">
          <button class="btn btn-primary" id="doors-after-${doorId}">חזרה למסך הדלתות</button>
          <button class="btn btn-secondary" id="final-after-${doorId}">למסך סיום</button>
        </div>
      </div>`;
      document.getElementById(`doors-after-${doorId}`).onclick = () => { renderDoors(); showScreen("screen-doors"); };
      document.getElementById(`final-after-${doorId}`).onclick = () => { renderFinal(); showScreen("screen-final"); };
    }

    function renderFinal() {
      const el = document.getElementById("screen-final");
      el.innerHTML = `${topStrip("סיום", `דלתות שהושלמו: ${state.completedDoors.size}`)}
      <div class="card">
        <h2>פיצחתם את קוד הטבע 🎉</h2>
        <p class="question-text">היום למדתם איך הטבע נותן רעיונות להמצאות חדשות.<br>הישארו בזום להמשך ההנחיה.</p>
        <div class="actions">
          <button class="btn btn-primary" id="restart">חזרה למסך הדלתות</button>
        </div>
      </div>`;
      document.getElementById("restart").onclick = () => { renderDoors(); showScreen("screen-doors"); };
    }

    renderHome();
  </script>
</body>
</html>
